server:
  port: 8080

spring:
  # 数据库配置由 profile 提供: application-mac.yml 或 application-windows.yml
  profiles:
    active: ${SPRING_PROFILE:mac}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  storage:
    local-path: ./uploads
    base-url: http://localhost:8080/uploads
