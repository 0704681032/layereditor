server:
  port: 8080

spring:
  # 数据库配置由 profile 提供: application-mac.yml 或 application-windows.yml
  profiles:
    active: ${SPRING_PROFILE:windows}
  datasource:
    hikari:
      # 连接池大小配置
      minimum-idle: 5
      maximum-pool-size: 20
      # 连接超时配置
      connection-timeout: 30000          # 获取连接超时30秒
      idle-timeout: 600000               # 空闲连接超时10分钟
      max-lifetime: 1800000              # 连接最大生命周期30分钟
      # 连接验证
      validation-timeout: 5000           # 验证连接超时5秒
      leak-detection-threshold: 60000    # 连接泄露检测60秒
      # 池名称
      pool-name: LayerEditorHikariPool
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      default_user_password_hash: ${APP_DEFAULT_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
      defaultUserPasswordHash: ${APP_DEFAULT_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # OpenFeign 配置
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
          volcengine-visual:
            connectTimeout: 5000
            readTimeout: 60000  # AI处理可能需要较长时间

# HTTP连接池配置 (用于OpenFeign + HttpClient5)
feign:
  httpclient:
    max-connections: 200
    max-connections-per-route: 50
    connection-timeout: 5000
    socket-timeout: 60000
    connection-ttl: 1800000
    idle-timeout: 600000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  storage:
    local-path: ./uploads
    base-url: http://localhost:8080/uploads
  auth:
    username: ${APP_AUTH_USERNAME:editor}
    password: ${APP_AUTH_PASSWORD:editor}
  volcengine:
    access-key: ${VOLC_ACCESS_KEY:}
    secret-key: ${VOLC_SECRET_KEY:}
    endpoint: ${VOLC_ENDPOINT:https://visual.volcengineapi.com}
    service: cv
    region: cn-north-1
    version: 2022-08-31
