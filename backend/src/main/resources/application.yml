server:
  port: 8080

spring:
  # 数据库配置由 profile 提供: application-mac.yml 或 application-windows.yml
  profiles:
    active: ${SPRING_PROFILE:windows}
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      default_user_password_hash: ${APP_DEFAULT_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
      defaultUserPasswordHash: ${APP_DEFAULT_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # OpenFeign 配置
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
          volcengine-visual:
            connectTimeout: 5000
            readTimeout: 60000  # AI处理可能需要较长时间

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  storage:
    local-path: ./uploads
    base-url: http://localhost:8080/uploads
  auth:
    username: ${APP_AUTH_USERNAME:editor}
    password: ${APP_AUTH_PASSWORD:editor}
  volcengine:
    access-key: ${VOLC_ACCESS_KEY:}
    secret-key: ${VOLC_SECRET_KEY:}
    endpoint: ${VOLC_ENDPOINT:https://visual.volcengineapi.com}
